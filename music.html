  <script>
    lucide.createIcons();

    // 테마 토글
    const themeToggleBtn = document.getElementById('theme-toggle');
    const themeIcon = document.getElementById('theme-icon');
    if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      document.documentElement.classList.add('dark');
      themeIcon.setAttribute('data-lucide', 'sun');
    }
    themeToggleBtn.addEventListener('click', () => {
      const isDark = document.documentElement.classList.toggle('dark');
      localStorage.theme = isDark ? 'dark' : 'light';
      themeIcon.setAttribute('data-lucide', isDark ? 'sun' : 'moon');
      lucide.createIcons();
    });

    // 장르 필터링 함수
    function filterMusic(genre) {
      const wrappers = document.querySelectorAll('.music-card-wrapper');
      const buttons = document.querySelectorAll('.filter-btn');

      // 버튼 색상 업데이트
      buttons.forEach(btn => {
        if (btn.id === `btn-${genre}`) {
          btn.className = "filter-btn px-5 py-2 text-sm font-bold rounded-full bg-indigo-600 text-white shadow-sm transition-all";
        } else {
          btn.className = "filter-btn px-5 py-2 text-sm font-semibold rounded-full bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 hover:border-indigo-500 hover:text-indigo-500 transition-all text-slate-600 dark:text-slate-300";
        }
      });

      // 카드 노출 제어
      wrappers.forEach(wrap => {
        if (genre === 'all' || wrap.getAttribute('data-genre') === genre) {
          wrap.style.display = 'block';
        } else {
          wrap.style.display = 'none';
        }
      });
    }
  </script>
